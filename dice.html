<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎲 Roll Your Budget! 🎉</title>
<style>
/* Imported Montserrat and Roboto Condensed to match your room game layout */
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto+Condensed:wght@700&display=swap');

body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  /* Dark Master Gradient: Immersive Blue-Black blending down into Boundless Blue */
  background: linear-gradient(180deg, #22404D, #285F74); 
  font-family: 'Montserrat', sans-serif; 
  overflow: hidden;
  color: #FFFFFF; 
}

h1 {
  margin-bottom: 40px;
  color: #FFFFFF; 
  font-size: 2.5rem;
  text-align: center;
  text-shadow: 2px 4px 10px rgba(0, 0, 0, 0.5); 
}

/* =================================================
   3D DICE CONTAINER & POPPING EFFECTS
================================================= */

.dice-container {
  perspective: 800px; /* Lower perspective increases the 3D depth, making it stick out more */
  margin-bottom: 50px;
  position: relative;
}

.dice {
  width: 250px;
  height: 250px;
  position: relative;
  transform-style: preserve-3d;
  transform: rotateX(0deg) rotateY(0deg);
  transition: transform 2s cubic-bezier(0.25, 1, 0.5, 1);
  margin: auto;
}

.face {
  position: absolute;
  width: 250px;
  height: 250px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 40px;
  font-weight: bold;
  border-radius: 32px;
  
  /* Dice background: Immersive Blue-Black to a vibrant Teal Blue gradient */
  background: #00b6c2;
  color: #FFFFFF; 
  border: 6px solid #FFFFFF; 
  box-shadow: 
    0 5px 10px rgba(0, 0, 0, 0.4),
    0 25px 50px rgba(0, 0, 0, 0.6); 
    
  backface-visibility: visible; 
}

/* Dice faces positions */
.face1 { transform: rotateY(0deg) translateZ(125px); }
.face2 { transform: rotateY(90deg) translateZ(125px); }
.face3 { transform: rotateY(180deg) translateZ(125px); }
.face4 { transform: rotateY(-90deg) translateZ(125px); }
.face5 { transform: rotateX(90deg) translateZ(125px); }
.face6 { transform: rotateX(-90deg) translateZ(125px); }

/* =================================================
   INTERACTIVE BUTTONS (Unified Palette Colors)
================================================= */

#rollBtn, #goRoomBtn {
  padding: 20px 40px;
  font-size: 26px;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  background: #e3e452; /* Enterprise Aqua */
  color: #22404D; /* Immersive Blue-Black */
  font-family: 'Roboto Condensed', sans-serif; 
  font-weight: bold;
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4); 
  transition: 0.3s;
}

#goRoomBtn {
  display: none; /* Keeps it hidden initially until the script fires */
  margin-top: 20px;
}

#rollBtn:hover, #goRoomBtn:hover {
  background: #00b6c2; /* Resilient Turquoise */
  color: #FFFFFF; 
  transform: scale(1.05);
  box-shadow: 0 12px 24px rgba(0, 0, 0, 0.5);
}

/* =================================================
   CONFETTI (Fixed Layout Rules)
================================================= */
.confetti {
  position: fixed; /* Fixed position removes them completely from the flexbox layout container */
  width: 10px;
  height: 10px;
  top: -20px;
  z-index: 9999; /* Ensures they drop cleanly on top of backgrounds and elements */
  animation: fall 3s linear infinite;
  pointer-events: none; /* Prevents user clicks on the screen from hitting an invisible box */
}

@keyframes fall {
  0% { transform: translateY(0px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
}
</style>
</head>
<body>

<h1>🎲 Roll the Dice to Get Your Budget! 💰</h1>

<div class="dice-container">
  <div class="dice" id="dice">
    <div class="face face1">💰 $2500</div>
    <div class="face face2">💰 $3000</div>
    <div class="face face3">💰 $3500</div>
    <div class="face face4">💰 $4000</div>
    <div class="face face5">💰 $4500</div>
    <div class="face face6">💰 $5000</div>
  </div>
  <div class="shadow" id="shadow"></div>
</div>

<button id="rollBtn">🎉 Roll Dice! 🎉</button>

<button id="goRoomBtn">🏠 Go Design Your Room! 🎨</button>

<audio id="rollSound" src="dice-roll.mp3"></audio>

<script>
const dice = document.getElementById('dice');
const shadow = document.getElementById('shadow');
const rollBtn = document.getElementById('rollBtn');
const goRoomBtn = document.getElementById('goRoomBtn');
const rollSound = document.getElementById('rollSound');

const rotations = [
  { x: 0, y: 0 },
  { x: 0, y: -90 },
  { x: 0, y: -180 },
  { x: 0, y: 90 },
  { x: 90, y: 0 },
  { x: -90, y: 0 }
];

function rollDice3D() {
  rollBtn.disabled = true;
  rollSound.currentTime = 0;
  rollSound.play();

  const finalFace = Math.floor(Math.random() * 6);
  const extraX = 360 * (Math.floor(Math.random() * 3) + 2);
  const extraY = 360 * (Math.floor(Math.random() * 3) + 2);
  const finalX = rotations[finalFace].x + extraX;
  const finalY = rotations[finalFace].y + extraY;

  dice.style.transition = 'transform 2s cubic-bezier(0.25, 1, 0.5, 1)';
  dice.style.transform = `rotateX(${finalX}deg) rotateY(${finalY}deg)`;

  setTimeout(() => {
    dice.style.transition = 'transform 0.2s';
    dice.style.transform += ' translateY(-20px)';

    setTimeout(() => {
      dice.style.transform = `rotateX(${finalX}deg) rotateY(${finalY}deg) translateY(0px)`;
    }, 200);

    const budgetMap = [2500, 3000, 3500, 4000, 5000, 4500];
    const finalBudget = budgetMap[finalFace];
    localStorage.setItem('gameBudget', finalBudget);

    goRoomBtn.style.display = 'block';
  }, 2200);
}

rollBtn.addEventListener('click', rollDice3D);
goRoomBtn.addEventListener('click', () => {
  window.location.href = 'start.html';
});

/* Refactored Loop to safely map full screen random widths across different monitors */
for(let i=0; i<50; i++){
  const conf = document.createElement('div');
  conf.className = 'confetti';
  conf.style.left = Math.random() * 100 + 'vw'; /* Switched to vw to scale fluidly from edge to edge */
  conf.style.background = `hsl(${Math.random()*360}, 100%, 50%)`;
  conf.style.animationDuration = 2 + Math.random()*3 + 's';
  document.body.appendChild(conf);
}
</script>
</body>
</html>
